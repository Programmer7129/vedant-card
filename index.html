<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vedant Patel — Vrin</title>
<link rel="icon" href="icon.svg" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF9;
    --card-bg: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #9E9E9E;
    --accent: #0A0A0A;
    --accent-light: #F0F0EE;
    --border: #E8E8E6;
    --border-hover: #D0D0CC;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    --shadow-hover: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.05);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card-container {
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ---- Banner ---- */
  .banner {
    height: 120px;
    background: var(--card-bg);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }

  .banner-tagline {
    font-family: 'Silkscreen', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: var(--text-primary);
    line-height: 1.3;
    letter-spacing: 0.5px;
  }

  .banner-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    position: absolute;
    bottom: 14px;
    right: 24px;
  }

  .banner-icon {
    height: 24px;
    width: auto;
  }

  .banner-logo-text {
    height: 16px;
    width: auto;
  }

  /* ---- Header ---- */
  .card-header {
    padding: 0 32px 28px;
    position: relative;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 32px; right: 32px;
    height: 1px;
    background: var(--border);
  }

  .profile-photo-wrap {
    margin-top: -44px;
    margin-bottom: 16px;
    position: relative;
    width: 88px;
    height: 88px;
  }

  .profile-photo {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--card-bg);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: block;
  }

  .name {
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .title {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 400;
    line-height: 1.4;
  }

  .title span {
    color: var(--text-tertiary);
    margin: 0 5px;
  }

  /* ---- Contact Links ---- */
  .contact-section {
    padding: 20px 32px 24px;
  }

  .contact-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .contact-links {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .contact-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    text-decoration: none;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 400;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  .contact-link:hover {
    background: var(--accent-light);
  }

  .contact-link:active {
    transform: scale(0.985);
  }

  .contact-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s ease;
  }

  .contact-link:hover .contact-icon {
    background: var(--border);
  }

  .contact-icon svg {
    width: 16px; height: 16px;
    stroke: var(--text-secondary);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .contact-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .contact-text .label {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .contact-text .value {
    font-size: 14px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---- Actions ---- */
  .actions {
    padding: 0 32px 28px;
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow);
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover {
    background: #2A2A2A;
    border-color: #2A2A2A;
  }

  .btn svg {
    width: 15px; height: 15px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---- QR Modal ---- */
  .qr-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    padding: 24px;
  }

  .qr-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .qr-modal {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 36px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 24px 48px rgba(0,0,0,0.12);
    transform: scale(0.92);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .qr-overlay.active .qr-modal {
    transform: scale(1);
  }

  .qr-modal h3 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .qr-modal p {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 24px;
  }

  .qr-canvas-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    display: inline-block;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }

  .qr-canvas-wrap canvas {
    display: block;
  }

  .qr-close {
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--accent-light);
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: background 0.2s;
  }

  .qr-close:hover {
    background: var(--border);
  }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- Footer ---- */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="card-container">
  <div class="card">

    <div class="banner">
      <div class="banner-tagline">Deep Reasoning<br>for AI</div>
      <div class="banner-brand">
        <img src="icon.svg" alt="Vrin" class="banner-icon">
        <img src="logo-text.png" alt="VRiN" class="banner-logo-text">
      </div>
    </div>

    <div class="card-header">
      <div class="profile-photo-wrap">
        <img src="profile-photo.JPEG" alt="Vedant Patel" class="profile-photo">
      </div>
      <div class="name">Vedant Patel</div>
      <div class="title">Founder & CEO <span>·</span> Vrin</div>
    </div>

    <div class="contact-section">
      <div class="contact-label">Contact</div>
      <div class="contact-links">

        <a href="mailto:vedant@vrin.cloud" class="contact-link">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
          </div>
          <div class="contact-text">
            <span class="label">Email</span>
            <span class="value">vedant@vrin.cloud</span>
          </div>
        </a>

        <a href="tel:+15302048133" class="contact-link">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <div class="contact-text">
            <span class="label">Phone</span>
            <span class="value">(530) 204-8133</span>
          </div>
        </a>

        <a href="https://www.linkedin.com/in/vedant1033/" target="_blank" rel="noopener" class="contact-link">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </div>
          <div class="contact-text">
            <span class="label">LinkedIn</span>
            <span class="value">vedant1033</span>
          </div>
        </a>

      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="saveContact()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Contact
      </button>
      <button class="btn" onclick="showQR()">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="21" y1="14" x2="21" y2="14"/><line x1="21" y1="21" x2="21" y2="21"/></svg>
        QR Code
      </button>
    </div>

  </div>

  <div class="footer">Tap "Save Contact" to add to your phone</div>
</div>

<!-- QR Overlay -->
<div class="qr-overlay" id="qrOverlay" onclick="hideQR(event)">
  <div class="qr-modal" onclick="event.stopPropagation()">
    <h3>Scan to connect</h3>
    <p>Point your camera at the code</p>
    <div class="qr-canvas-wrap">
      <canvas id="qrCanvas"></canvas>
    </div>
    <br>
    <button class="qr-close" onclick="hideQR()">Close</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ---- vCard Download ----
function saveContact() {
  const vcard = `BEGIN:VCARD
VERSION:3.0
N:Patel;Vedant;;;
FN:Vedant Patel
ORG:Vrin
TITLE:Founder & CEO
TEL;TYPE=CELL:+15302048133
EMAIL:vedant@vrin.cloud
URL:https://www.linkedin.com/in/vedant1033/
END:VCARD`;

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Vedant_Patel.vcf';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Contact file downloaded');
}

// ---- QR Code (minimal generator) ----
function showQR() {
  document.getElementById('qrOverlay').classList.add('active');
  generateQR();
}

function hideQR(e) {
  if (e && e.target !== document.getElementById('qrOverlay')) return;
  document.getElementById('qrOverlay').classList.remove('active');
}

// Simple QR using an external library loaded on-demand
function generateQR() {
  const canvas = document.getElementById('qrCanvas');
  const size = 180;
  canvas.width = size;
  canvas.height = size;

  // Use the page URL or vcard data
  const data = window.location.href !== 'about:blank' && !window.location.href.startsWith('file:')
    ? window.location.href
    : 'https://www.linkedin.com/in/vedant1033/';

  // Load QRious library
  if (typeof QRious !== 'undefined') {
    renderQR(data);
  } else {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js';
    script.onload = () => renderQR(data);
    script.onerror = () => {
      // Fallback: show a simple placeholder
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f0f0ee';
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#9e9e9e';
      ctx.font = '13px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('QR unavailable offline', size/2, size/2);
    };
    document.head.appendChild(script);
  }
}

function renderQR(data) {
  new QRious({
    element: document.getElementById('qrCanvas'),
    value: data,
    size: 180,
    foreground: '#1A1A1A',
    background: '#FFFFFF',
    level: 'M'
  });
}

// ---- Toast ----
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
</script>
</body>
</html>
